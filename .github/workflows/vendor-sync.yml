name: Vendor Sync

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to sync (agentmemory | understand-anything | agent-skills | all)"
        required: true
        type: choice
        options:
          - agentmemory
          - understand-anything
          - agent-skills
          - all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync agentmemory
        if: ${{ github.event.inputs.target == 'agentmemory' || github.event.inputs.target == 'all' }}
        run: |
          echo "Syncing agentmemory..."
          # Bun script to clone + extract iii engine + sqlite bindings + 22 hooks
          bun run script/vendor-sync.ts --target agentmemory

      - name: Sync Understand-Anything
        if: ${{ github.event.inputs.target == 'understand-anything' || github.event.inputs.target == 'all' }}
        run: |
          echo "Syncing Understand-Anything..."
          bun run script/vendor-sync.ts --target understand-anything

      - name: Sync agent-skills
        if: ${{ github.event.inputs.target == 'agent-skills' || github.event.inputs.target == 'all' }}
        run: |
          echo "Syncing agent-skills..."
          bun run script/vendor-sync.ts --target agent-skills

      - name: Run tests after sync
        run: bun test

      - name: Commit vendor changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vendored/ packages/companion/ script/vendor-sync.ts
          git diff --cached --quiet || git commit -m "vendor: sync ${{ github.event.inputs.target }}"
          git push
