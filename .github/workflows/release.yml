name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1)"
        required: true
        type: string
      breaking:
        description: "This release contains breaking changes"
        required: false
        default: "false"
        type: boolean
      dry_run:
        description: "Dry run (don't publish)"
        required: false
        default: "false"
        type: boolean
  issue_comment:
    types: [created]

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       startsWith(github.event.comment.body, '/release') &&
       github.event.comment.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Bump version
        run: |
          VERSION="${{ github.event.inputs.version || '0.0.0' }}"
          bun run npm version "$VERSION" --no-git-tag-version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.existsSync('CHANGELOG.md') ? fs.readFileSync('CHANGELOG.md', 'utf8') : '';
            const body = changelog.split('\n## ')[0] || 'Release';

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              name: `v${process.env.VERSION}`,
              body: `${body}\n\n---\n**Breaking:** ${{ github.event.inputs.breaking }}`,
            });

      - name: Comment on trigger issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              `✅ Released v${process.env.VERSION}`,
              '',
              `Breaking changes: ${{ github.event.inputs.breaking }}`,
              `Dry run: ${{ github.event.inputs.dry_run }}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
